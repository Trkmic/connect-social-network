<div *ngIf="isLoading" class="app-loader">
  <div class="loader-glow"></div>
  <p class="loader-text">Verificando sesión...</p>
</div>



<div *ngIf="!isLoading" class="app-background d-flex flex-column min-vh-100">

  <app-navbar></app-navbar>

  <main class="flex-fill w-100 p-0">
    <router-outlet></router-outlet>
  </main>

  <app-footer></app-footer>

</div>
