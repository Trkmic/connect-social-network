<div *ngFor="let item of [].constructor(count)" class="skeleton-post glass-card mb-4 p-4 shadow-sm">
  <div class="skeleton-header d-flex align-items-center gap-3 mb-3">
    <div class="skeleton-circle shimmer"></div>
    <div class="skeleton-text-container d-flex flex-column gap-2">
      <div class="skeleton-title shimmer"></div>
      <div class="skeleton-subtitle shimmer"></div>
    </div>
  </div>
  <div class="skeleton-body d-flex flex-column gap-2 mb-3">
    <div class="skeleton-line shimmer"></div>
    <div class="skeleton-line shimmer"></div>
    <div class="skeleton-line shimmer short"></div>
  </div>
  <div class="skeleton-footer d-flex gap-4">
    <div class="skeleton-btn shimmer"></div>
    <div class="skeleton-btn shimmer"></div>
  </div>
</div>
